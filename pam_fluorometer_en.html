<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAM Fluorometer — Virtual Lab</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh;padding:20px}
h1{font-size:16px;font-weight:500;color:#7eb8a4;letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px;border-bottom:1px solid #1e2530;padding-bottom:10px}

.layout{display:grid;grid-template-columns:160px 1fr;gap:16px;margin-bottom:16px}

/* Leaf chamber */
.chamber{background:#141920;border:1px solid #1e2d26;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:10px}
.phase-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.04em}
.ph-dark{background:#1c2230;color:#7084b0}
.ph-adapting{background:#2a2418;color:#d4a017;animation:pulse 1.5s infinite}
.ph-adapted{background:#1e2d26;color:#4dc990}
.ph-measuring{background:#2d1e21;color:#ff5a5f}

@keyframes pulse{50%{opacity:0.6}}

.leaf-container{position:relative;width:80px;height:120px}
.leaf-svg{width:100%;height:100%;filter:drop-shadow(0 0 10px rgba(0,0,0,0.5))}
.light-beam{position:absolute;top:-40px;left:50%;width:4px;height:60px;background:rgba(255,255,255,0);transform:translateX(-50%);border-radius:4px;transition:all 0.1s}

/* Controls */
.controls{background:#141920;border:1px solid #1e2530;border-radius:12px;padding:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.btn{background:#1c2230;border:1px solid #2d3748;color:#cbd5e1;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px}
.btn:hover{background:#252d3d;border-color:#4a5568}
.btn.on{background:#1e2d26;border-color:#4dc990;color:#4dc990}
.btn-flash{background:#4dc990;color:#0f1117;border:none}
.btn-flash:disabled{background:#1e2530;color:#4a5568;cursor:not-allowed}
.btn-reset{background:transparent;border-color:#3a1e1e;color:#ff5a5f}

/* Results Panel */
.results-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.panel{background:#141920;border:1px solid #1e2530;border-radius:12px;padding:16px}
.panel-title{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:12px;display:block;letter-spacing:.05em}

.param-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1e2530}
.param-row:last-child{border:none}
.pc-label{font-size:13px;color:#94a3b8}
.pc-val{font-family:monospace;font-size:15px;font-weight:600;color:#4dc990}
.pc-val.dim{color:#4a5568}

.chart-container{height:300px;background:#0c0e14;border:1px solid #1e2530;border-radius:12px;padding:10px;margin-bottom:16px}

.nav-back{display:inline-block;margin-bottom:15px;font-size:12px;color:#4dc990;text-decoration:none}
</style>
</head>
<body>

<a href="pam_tasks_en.html" class="nav-back">← back to tasks</a>
<h1>PAM-Fluorometer — Virtual Laboratory</h1>

<div class="layout">
  <div class="chamber">
    <div id="phaseBadge" class="phase-badge ph-dark">darkness</div>
    <div class="leaf-container">
      <div id="lightBeam" class="light-beam"></div>
      <svg class="leaf-svg" viewBox="0 0 100 150">
        <path id="leafFill" d="M50,140 Q85,100 85,60 Q85,10 50,10 Q15,10 15,60 Q15,100 50,140" fill="#1a251e" stroke="#2d3a31" stroke-width="2"/>
        <path d="M50,140 L50,10" fill="none" stroke="#2d3a31" stroke-width="1" opacity="0.3"/>
      </svg>
    </div>
  </div>

  <div class="chart-container">
    <canvas id="pamChart"></canvas>
  </div>
</div>

<div class="controls">
  <button id="btnDark" class="btn" onclick="startDarkAdaptation()">⏱ Dark Adaptation (30s)</button>
  <button id="btnML" class="btn" onclick="toggleML()">Measuring Light ON</button>
  <button id="btnAct" class="btn" onclick="toggleActinic()">Actinic Light ON</button>
  <button id="btnFlash" class="btn btn-flash" onclick="fireFlash()" disabled>⚡ Saturating Pulse</button>
  <div style="flex-grow:1"></div>
  <button class="btn btn-reset" onclick="resetAll()">Reset</button>
</div>

<div class="results-grid" style="margin-top:16px">
  <div class="panel">
    <span class="panel-title">Base Parameters</span>
    <div class="param-row"><span class="pc-label">F₀ (Basal)</span><span id="vF0" class="pc-val dim">—</span></div>
    <div class="param-row"><span class="pc-label">Fm (Max Dark)</span><span id="vFm" class="pc-val dim">—</span></div>
    <div class="param-row"><span class="pc-label">Fv/Fm (Max Yield)</span><span id="vFvFm" class="pc-val dim">—</span></div>
  </div>
  <div class="panel">
    <span class="panel-title">Calculated Indices</span>
    <div class="param-row"><span class="pc-label">Y(II) (Quantum Yield)</span><span id="vYII" class="pc-val dim">—</span></div>
    <div class="param-row"><span class="pc-label">NPQ (Non-photochem.)</span><span id="vNPQ" class="pc-val dim">—</span></div>
    <div class="param-row"><span class="pc-label">qP (Photochemical)</span><span id="vqP" class="pc-val dim">—</span></div>
    <div class="param-row"><span class="pc-label">ETR (Electron Rate)</span><span id="vETR" class="pc-val dim">—</span></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let S = {
  t: 0,
  phase: 'idle', // idle, adapting, adapted, measuring
  measOn: false,
  actOn: false,
  adapted: false,
  tAct: null,
  F0: null,
  Fm: null,
  flashCool: false
};

const ctx = document.getElementById('pamChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    datasets: [
      { label: 'Fluorescence (F)', data: [], borderColor: '#4dc990', borderWidth: 2, pointRadius: 0, fill: false, tension: 0.1 },
      { label: 'Pulses', data: [], borderColor: '#fff', borderWidth: 1, borderDash: [5,5], pointRadius: 0, fill: false }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    scales: {
      x: { type: 'linear', position: 'bottom', title: { display: true, text: 'Time (s)', color: '#64748b' }, grid: { color: '#1e2530' }, ticks: { color: '#64748b' }, min: 0, max: 12 },
      y: { title: { display: true, text: 'Signal (r.u.)', color: '#64748b' }, grid: { color: '#1e2530' }, ticks: { color: '#64748b' }, min: 0, max: 1200 }
    },
    plugins: { legend: { display: false } }
  }
});

function startDarkAdaptation() {
  if(S.phase !== 'idle') return;
  S.phase = 'adapting';
  const btn = document.getElementById('btnDark');
  btn.classList.add('on');
  setPhase('adapting...', 'ph-adapting');
  
  let sec = 30;
  const timer = setInterval(() => {
    sec--;
    btn.textContent = `Adapting... (${sec}s)`;
    if(sec <= 0) {
      clearInterval(timer);
      S.phase = 'adapted';
      S.adapted = true;
      btn.textContent = '✓ Adapted';
      setPhase('adapted', 'ph-adapted');
      setLeaf('dark-ready');
    }
  }, 100); // Accelerated for demo
}

function toggleML() {
  S.measOn = !S.measOn;
  document.getElementById('btnML').classList.toggle('on', S.measOn);
  document.getElementById('btnFlash').disabled = !S.measOn;
  setLeaf(S.measOn ? 'measuring' : (S.adapted ? 'dark-ready' : 'dark'));
}

function toggleActinic() {
  if(!S.measOn) return;
  S.actOn = !S.actOn;
  document.getElementById('btnAct').classList.toggle('on', S.actOn);
  if(S.actOn) S.tAct = S.t;
}

function fireFlash() {
  if(!S.measOn || S.flashCool) return;
  const currentF = calculateF();
  let flashMax = S.adapted ? 1000 : (S.actOn ? 750 : 600);
  
  // Record parameters
  if(S.adapted && !S.actOn) {
    S.F0 = currentF;
    S.Fm = flashMax;
    updateVal('vF0', S.F0.toFixed(0));
    updateVal('vFm', S.Fm.toFixed(0));
    updateVal('vFvFm', ((S.Fm - S.F0)/S.Fm).toFixed(3));
  } else if (S.actOn) {
    const yieldVal = (flashMax - currentF) / flashMax;
    updateVal('vYII', yieldVal.toFixed(3));
    if(S.Fm) updateVal('vNPQ', (S.Fm/flashMax - 1).toFixed(2));
    updateVal('vETR', (yieldVal * 0.84 * 0.5 * 200).toFixed(1));
  }

  // Visual pulse
  chart.data.datasets[1].data.push({x: S.t, y: 0}, {x: S.t, y: 1200}, {x: S.t+0.1, y: 0});
  chart.data.datasets[0].data.push({x: S.t, y: flashMax});
  
  S.flashCool = true;
  setTimeout(() => S.flashCool = false, 1000);
}

function calculateF() {
  if(!S.measOn) return 0;
  let base = S.adapted ? 200 : 250;
  if(S.actOn) {
    let elapsed = S.t - S.tAct;
    // Kautsky Effect simulation
    let peak = 400;
    let steady = 280;
    base = steady + (peak - steady) * Math.exp(-elapsed * 0.5);
  }
  return base + (Math.random() * 4 - 2);
}

function updateVal(id, v) {
  const el = document.getElementById(id);
  el.textContent = v;
  el.className = 'pc-val';
}

setInterval(() => {
  if(S.phase === 'idle' || S.phase === 'adapting') return;
  S.t += 0.1;
  const val = calculateF();
  chart.data.datasets[0].data.push({x: S.t, y: val});
  if(S.t > chart.options.scales.x.max) {
    chart.options.scales.x.min += 0.1;
    chart.options.scales.x.max += 0.1;
  }
  chart.update('none');
}, 100);

function setPhase(txt,cls){
  const el=document.getElementById('phaseBadge');
  el.textContent=txt;el.className='phase-badge '+cls;
}

function setLeaf(m){
  const lf=document.getElementById('leafFill');
  const lb=document.getElementById('lightBeam');
  if(m==='dark'){lf.setAttribute('fill','#1a251e');lb.style.background='none'}
  if(m==='dark-ready'){lf.setAttribute('fill','#2d4a35');lb.style.background='none'}
  if(m==='measuring'){
    lf.setAttribute('fill','#4dc990');
    lb.style.background='linear-gradient(to bottom, rgba(77,201,144,0.5), transparent)';
  }
}

function resetAll() {
  location.reload();
}
</script>
</body>
</html>
