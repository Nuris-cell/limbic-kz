<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лаборатория: Ba(OH)₂/HCl</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:700px;height:490px;overflow:hidden;font-family:'Inter',sans-serif;background:#f8fafc;color:#334155;display:flex;}

.panel{background:white;border-right:1px solid #f1f5f9;padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;}
.panel.right{border-right:none;border-left:1px solid #f1f5f9;}
.panel-main{flex:1;display:flex;align-items:center;justify-content:center;gap:28px;background:#f8fafc;padding:10px;flex-shrink:0;}

.lbl{font-size:9px;font-weight:900;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:4px;}
.card{background:white;border-radius:8px;border:1px solid #f1f5f9;padding:8px;}

.btn-action{display:flex;align-items:center;gap:7px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:7px;padding:6px 8px;cursor:pointer;font-size:10px;font-weight:600;color:#475569;width:100%;text-align:left;font-family:'Inter',sans-serif;transition:background .15s;}
.btn-action:hover:not(:disabled){background:#f1f5f9;}
.btn-action:disabled{opacity:.38;cursor:not-allowed;}
.ind-btn{background:#ec4899;color:white;border:none;border-radius:6px;padding:3px 9px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
.ind-btn:disabled{background:#cbd5e1;cursor:not-allowed;}

.tag{font-size:9px;font-weight:700;padding:1px 6px;border-radius:999px;display:inline-block;}
.tag-green{background:#dcfce7;color:#16a34a;}
.tag-red{background:#fee2e2;color:#dc2626;}
.tag-gray{background:#f1f5f9;color:#64748b;}
.tag-blue{background:#dbeafe;color:#1d4ed8;}

.rrow{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid #f1f5f9;}
.rrow:last-child{border-bottom:none;}
.rlbl{font-size:9px;color:#64748b;}
.rval{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:#1e293b;}

.buret-body{width:28px;height:340px;background:#f0f4f8;border:1px solid #b2becd;border-radius:0 0 8px 8px;position:relative;}
.buret-liquid{position:absolute;bottom:0;width:100%;background:#fee2e2;transition:height .08s linear;}
.meniscus{position:absolute;top:-6px;left:0;width:100%;height:12px;background:#f8fafc;border-bottom:2px solid #ef4444;border-radius:0 0 50% 50%;}
.smark{position:absolute;right:0;height:1px;background:#64748b;width:6px;}
.smark.major{width:11px;background:#1e293b;}
.slabel{position:absolute;left:3px;font-family:'JetBrains Mono',monospace;font-size:7.5px;font-weight:700;color:#1e293b;transform:translateY(-50%);}
.tap-box{width:46px;height:28px;background:#cbd5e1;border:1px solid #94a3b8;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;margin-top:5px;}
.tap-handle{width:7px;height:100%;background:#0f172a;border-radius:3px;transition:transform .3s;}
.tap-open{transform:rotate(90deg);}

.drop{position:absolute;width:3px;height:7px;background:#fca5a5;border-radius:40%;animation:drip .5s linear infinite;}
@keyframes drip{from{transform:translateY(0);opacity:1;}to{transform:translateY(130px);opacity:0;}}

.flask{cursor:pointer;transition:opacity .3s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.flask:not(.active){opacity:.4;}
.flask svg{filter:drop-shadow(0 2px 4px rgba(0,0,0,.07));}

#summary-panel{display:none;width:100%;}
table{width:100%;border-collapse:collapse;}
th{padding:3px 3px;color:#94a3b8;font-weight:900;text-transform:uppercase;font-size:7.5px;background:#f8fafc;text-align:center;}
td{padding:3px 3px;font-family:'JetBrains Mono',monospace;font-size:8px;text-align:center;color:#1e293b;}
</style>
</head>
<body>

<!-- LEFT PANEL -->
<aside class="panel" style="width:172px;min-width:172px;">

  <div>
    <span class="lbl">Шаг 1 — Бюретка</span>
    <button class="btn-action" id="btn-fill" onclick="fillBuret()">
      <span style="color:#ef4444;font-size:14px;line-height:1;">↑</span>
      <span>Заполнить HCl<br><span style="color:#94a3b8;font-weight:400;font-size:8.5px;">25.00 мл · 0.1000 М</span></span>
    </button>
  </div>

  <div>
    <span class="lbl">Шаг 2 — Проба</span>
    <div style="display:flex;flex-direction:column;gap:4px;">
      <button class="btn-action" id="btn-filter" onclick="filterSample()" disabled>
        <span style="font-size:13px;line-height:1;">🔽</span>
        <span>Фильтровать пробу<br><span style="color:#94a3b8;font-weight:400;font-size:8.5px;">Отделить BaCO₃↓</span></span>
      </button>
      <button class="btn-action" id="btn-transfer" onclick="transferSample()" disabled>
        <span style="color:#f59e0b;font-size:14px;line-height:1;">⬡</span>
        <span>Перенести фильтрат<br><span style="color:#94a3b8;font-weight:400;font-size:8.5px;">Ba(OH)₂ (фильтрат)</span></span>
      </button>
    </div>
  </div>

  <div>
    <span class="lbl">Шаг 3 — Индикатор</span>
    <div class="card" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
      <div style="width:8px;height:8px;border-radius:50%;background:#ec4899;flex-shrink:0;"></div>
      <span style="font-size:9.5px;font-weight:600;">Фенолфталеин</span>
      <button class="ind-btn" id="btn-ind" onclick="addDrop()" disabled>+</button>
      <span id="drop-count" style="font-size:9px;color:#64748b;width:100%;margin-top:1px;"></span>
    </div>
  </div>

  <div>
    <span class="lbl">Реакции</span>
    <div class="card" style="font-size:9px;font-family:'JetBrains Mono',monospace;line-height:1.65;color:#64748b;">
      CO₂ + Ba(OH)₂ →<br>BaCO₃↓ + H₂O<br><br>
      Ba(OH)₂ + 2HCl →<br>BaCl₂ + 2H₂O
    </div>
  </div>

  <button class="btn-action" onclick="resetFlask()" style="margin-top:auto;">
    <span style="color:#94a3b8;">↺</span> Сбросить колбу
  </button>

</aside>

<!-- MAIN SCENE -->
<main class="panel-main">

  <div style="display:flex;flex-direction:column;align-items:center;">
    <div style="font-size:9px;font-weight:700;color:#ef4444;margin-bottom:4px;font-family:'JetBrains Mono',monospace;letter-spacing:.05em;">HCl</div>
    <div class="buret-body">
      <div id="buret-liquid" class="buret-liquid" style="height:0%"><div class="meniscus"></div></div>
      <div id="buret-scale" style="position:absolute;inset:0;pointer-events:none;"></div>
    </div>
    <div style="width:4px;height:20px;background:#cbd5e1;"></div>
    <div class="tap-box" onclick="toggleTap()">
      <div id="tap-handle" class="tap-handle"></div>
      <div id="drop-point" style="position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:8px;"></div>
    </div>
    <div style="width:4px;height:32px;background:#cbd5e1;border-radius:0 0 3px 3px;"></div>
    <span style="font-size:7.5px;font-weight:900;color:#94a3b8;text-transform:uppercase;margin-top:3px;">Кран</span>
    <div id="buret-reading" style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:#1e293b;margin-top:2px;">25.00 мл</div>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
    <div style="display:flex;gap:14px;">

      <div class="flask active" id="flask-0" onclick="selectFlask(0)">
        <svg viewBox="0 0 100 110" preserveAspectRatio="none" width="82" height="102">
          <defs><clipPath id="clip0"><path d="M35 0 L65 0 L105 110 L-5 110 Z"/></clipPath></defs>
          <path d="M35 0 L65 0 L105 110 L-5 110 Z" fill="white" stroke="#cbd5e1" stroke-width="2"/>
          <path id="liq-0" d="M-5 110 L105 110 L105 110 L-5 110 Z" fill="transparent" clip-path="url(#clip0)" style="transition:all .3s;"/>
          <path d="M35 0 L65 0 L105 110 L-5 110 Z" fill="none" stroke="#94a3b8" stroke-width="2"/>
        </svg>
        <div style="font-size:8px;font-weight:700;color:#94a3b8;text-transform:uppercase;">Опыт 1</div>
        <div id="spent-lbl-0" style="font-size:8px;font-family:'JetBrains Mono',monospace;color:#94a3b8;"></div>
      </div>

      <div class="flask" id="flask-1" onclick="selectFlask(1)">
        <svg viewBox="0 0 100 110" preserveAspectRatio="none" width="82" height="102">
          <defs><clipPath id="clip1"><path d="M35 0 L65 0 L105 110 L-5 110 Z"/></clipPath></defs>
          <path d="M35 0 L65 0 L105 110 L-5 110 Z" fill="white" stroke="#cbd5e1" stroke-width="2"/>
          <path id="liq-1" d="M-5 110 L105 110 L105 110 L-5 110 Z" fill="transparent" clip-path="url(#clip1)" style="transition:all .3s;"/>
          <path d="M35 0 L65 0 L105 110 L-5 110 Z" fill="none" stroke="#94a3b8" stroke-width="2"/>
        </svg>
        <div style="font-size:8px;font-weight:700;color:#94a3b8;text-transform:uppercase;">Опыт 2</div>
        <div id="spent-lbl-1" style="font-size:8px;font-family:'JetBrains Mono',monospace;color:#94a3b8;"></div>
      </div>

      <div class="flask" id="flask-2" onclick="selectFlask(2)">
        <svg viewBox="0 0 100 110" preserveAspectRatio="none" width="82" height="102">
          <defs><clipPath id="clip2"><path d="M35 0 L65 0 L105 110 L-5 110 Z"/></clipPath></defs>
          <path d="M35 0 L65 0 L105 110 L-5 110 Z" fill="white" stroke="#cbd5e1" stroke-width="2"/>
          <path id="liq-2" d="M-5 110 L105 110 L105 110 L-5 110 Z" fill="transparent" clip-path="url(#clip2)" style="transition:all .3s;"/>
          <path d="M35 0 L65 0 L105 110 L-5 110 Z" fill="none" stroke="#94a3b8" stroke-width="2"/>
        </svg>
        <div style="font-size:8px;font-weight:700;color:#94a3b8;text-transform:uppercase;">Опыт 3</div>
        <div id="spent-lbl-2" style="font-size:8px;font-family:'JetBrains Mono',monospace;color:#94a3b8;"></div>
      </div>

    </div>

    <div id="summary-panel">
      <div class="lbl" style="margin-bottom:4px;">Результаты</div>
      <div id="summary-content" style="background:white;border-radius:8px;border:1px solid #f1f5f9;padding:6px;"></div>
    </div>
  </div>

</main>

<!-- RIGHT PANEL -->
<aside class="panel right" style="width:172px;min-width:172px;">

  <div>
    <span class="lbl">Бюретка</span>
    <div class="card" style="display:flex;flex-direction:column;">
      <div class="rrow"><span class="rlbl">V₀ (начало)</span><span class="rval" id="r-start">0.00 мл</span></div>
      <div class="rrow"><span class="rlbl">V₁ (конец)</span><span class="rval" id="r-end">—</span></div>
      <div class="rrow"><span class="rlbl">V(HCl)</span><span class="rval" id="r-vol">—</span></div>
    </div>
  </div>

  <div>
    <span class="lbl">Статус колбы</span>
    <div class="card" style="display:flex;flex-direction:column;gap:5px;">
      <div style="display:flex;justify-content:space-between;align-items:center;"><span class="rlbl">Фильтр</span><span id="st-filter" class="tag tag-gray">нет</span></div>
      <div style="display:flex;justify-content:space-between;align-items:center;"><span class="rlbl">Проба</span><span id="st-sample" class="tag tag-gray">нет</span></div>
      <div style="display:flex;justify-content:space-between;align-items:center;"><span class="rlbl">Инд. (кап.)</span><span id="st-ind" class="tag tag-gray">0</span></div>
      <div style="display:flex;justify-content:space-between;align-items:center;"><span class="rlbl">Цвет</span><span id="st-color" class="tag tag-gray">—</span></div>
    </div>
  </div>

  <div id="calc-block" style="display:none;">
    <span class="lbl">Показания бюретки</span>
    <div class="card" id="calc-rows" style="display:flex;flex-direction:column;"></div>
  </div>

</aside>

<script>
const V_BA   = 20.00;
const C_BA   = 0.05000;
const C_HCL  = 0.1000;
const M_SEED = 10.00;
const TIME_H = 2;
const M_CO2  = 44.01;
const nBA_INIT = C_BA * V_BA;

const FIXED_NCO2 = [0.2700, 0.2750, 0.2720];

let buretVol = 0, activeIdx = 0, isTapOpen = false, dripInt = null, startVol = 0;
let buretFilled = false;

function makeFlask(i) {
  const nCO2 = FIXED_NCO2[i];
  const target = 2 * (nBA_INIT - nCO2) / C_HCL;
  return { filtered:false, hasSample:false, indDrops:0, spent:0, target, recorded:false };
}
const flasks = [makeFlask(0), makeFlask(1), makeFlask(2)];

// Buret scale
const scaleEl = document.getElementById('buret-scale');
for (let i = 0; i <= 250; i++) {
  const pos = (i / 250) * 100;
  const major = i % 10 === 0;
  const m = document.createElement('div');
  m.className = 'smark' + (major ? ' major' : '');
  m.style.top = pos + '%';
  scaleEl.appendChild(m);
  if (major) {
    const l = document.createElement('div');
    l.className = 'slabel';
    l.style.top = pos + '%';
    l.textContent = i / 10;
    scaleEl.appendChild(l);
  }
}

// ── Step buttons state ──
function refreshButtons() {
  const f = flasks[activeIdx];
  document.getElementById('btn-filter').disabled   = !buretFilled || f.filtered;
  document.getElementById('btn-transfer').disabled = !f.filtered || f.hasSample;
  document.getElementById('btn-ind').disabled      = !f.hasSample || f.indDrops >= 4;
}

// ── Buret ──
function fillBuret() {
  if (isTapOpen) return;
  buretVol = 25; startVol = 0; buretFilled = true;
  updateBuret();
  document.getElementById('r-start').textContent = '0.00 мл';
  document.getElementById('r-end').textContent = '—';
  document.getElementById('r-vol').textContent = '—';
  refreshButtons();
}

// ── Select flask ──
function selectFlask(i) {
  if (isTapOpen) toggleTap();
  activeIdx = i;
  document.querySelectorAll('.flask').forEach((f, idx) => f.classList.toggle('active', idx === i));
  startVol = 25 - buretVol;
  document.getElementById('r-start').textContent = startVol.toFixed(2) + ' мл';
  document.getElementById('r-end').textContent = '—';
  document.getElementById('r-vol').textContent = '—';
  document.getElementById('calc-block').style.display = 'none';
  updateSide(); refreshButtons();
}

// ── Filter sample ──
function filterSample() {
  const f = flasks[activeIdx];
  if (f.filtered) { flash('Уже отфильтровано!'); return; }
  // Simulate filtration delay with visual
  const btn = document.getElementById('btn-filter');
  btn.disabled = true;
  btn.querySelector('span:last-child').textContent = 'Фильтрация…';
  setTimeout(() => {
    f.filtered = true;
    btn.querySelector('span:last-child').innerHTML = 'Фильтровать пробу<br><span style="color:#94a3b8;font-weight:400;font-size:8.5px;">Отделить BaCO₃↓</span>';
    updateSide(); refreshButtons();
    flash('BaCO₃↓ отделён');
  }, 1200);
}

// ── Transfer sample ──
function transferSample() {
  const f = flasks[activeIdx];
  if (!f.filtered) { flash('Сначала отфильтруйте!'); return; }
  if (f.hasSample) { flash('Проба уже добавлена!'); return; }
  f.hasSample = true; updateFlask(activeIdx); updateSide(); refreshButtons();
}

// ── Add indicator drop ──
function addDrop() {
  const f = flasks[activeIdx];
  if (!f.hasSample) { flash('Сначала добавьте пробу!'); return; }
  if (f.indDrops >= 4) { flash('Максимум 4 капли!'); return; }
  f.indDrops++;
  updateFlask(activeIdx); updateSide(); refreshButtons();
  const dc = document.getElementById('drop-count');
  dc.textContent = f.indDrops + ' кап. добавлено';
  if (f.indDrops >= 2) dc.style.color = '#16a34a'; else dc.style.color = '#dc2626';
}

// ── Tap ──
function toggleTap() {
  const f = flasks[activeIdx];
  if (!buretFilled) { flash('Сначала заполните бюретку!'); return; }
  if (!f.hasSample) { flash('Добавьте пробу!'); return; }
  if (f.indDrops < 2) { flash('Добавьте минимум 2 капли индикатора!'); return; }
  if (buretVol <= 0 && !isTapOpen) { flash('Бюретка пуста!'); return; }

  if (isTapOpen) {
    clearInterval(dripInt); dripInt = null;
    document.getElementById('drop-point').innerHTML = '';
    isTapOpen = false;
    document.getElementById('tap-handle').classList.remove('tap-open');
    // Record readings each time the tap is closed (student decides when endpoint is reached)
    if (f.spent > 0.05) {
      if (!f.recorded) f.recorded = true;
      onEndpoint();
    }
  } else {
    isTapOpen = true;
    document.getElementById('tap-handle').classList.add('tap-open');
    document.getElementById('drop-point').innerHTML = '<div class="drop"></div>';
    dripInt = setInterval(() => {
      if (!isTapOpen) return;
      if (buretVol <= 0) {
        clearInterval(dripInt); dripInt = null;
        document.getElementById('drop-point').innerHTML = '';
        isTapOpen = false;
        document.getElementById('tap-handle').classList.remove('tap-open');
        flash('Бюретка пуста!');
        return;
      }
      buretVol -= 0.04; f.spent += 0.04;
      updateBuret(); updateFlask(activeIdx); updateSide();
    }, 80);
  }
}

function resetFlask() {
  if (isTapOpen) {
    clearInterval(dripInt); dripInt = null;
    document.getElementById('drop-point').innerHTML = '';
    isTapOpen = false;
    document.getElementById('tap-handle').classList.remove('tap-open');
  }
  flasks[activeIdx] = makeFlask(activeIdx);
  startVol = 25 - buretVol;
  updateFlask(activeIdx); updateSide(); refreshButtons();
  document.getElementById('spent-lbl-' + activeIdx).textContent = '';
  document.getElementById('r-end').textContent = '—';
  document.getElementById('r-vol').textContent = '—';
  document.getElementById('calc-block').style.display = 'none';
  document.getElementById('summary-panel').style.display = 'none';
  document.getElementById('drop-count').textContent = '';
}

// ── Buret display ──
function updateBuret() {
  document.getElementById('buret-liquid').style.height = (buretVol / 25 * 100) + '%';
  document.getElementById('buret-reading').textContent = buretVol.toFixed(2) + ' мл';
  const curEnd = 25 - buretVol;
  document.getElementById('r-end').textContent = curEnd.toFixed(2) + ' мл';
  const diff = curEnd - startVol;
  document.getElementById('r-vol').textContent = diff > 0.001 ? diff.toFixed(2) + ' мл' : '—';
}

// ── Flask liquid ──
function updateFlask(idx) {
  const f = flasks[idx];
  const liq = document.getElementById('liq-' + idx);
  if (!f.hasSample) {
    liq.setAttribute('d','M-5 110 L105 110 L105 110 L-5 110 Z');
    liq.setAttribute('fill','transparent'); return;
  }
  const h = 68, y = 110 - h * 1.1, hw_b = 55, hw_t = hw_b - h * 0.35;
  liq.setAttribute('d', `M${50-hw_t} ${y} L${50+hw_t} ${y} L${50+hw_b} 110 L${50-hw_b} 110 Z`);
  if (f.indDrops === 0) liq.setAttribute('fill','#e0f2fe');
  else if (f.spent >= f.target) liq.setAttribute('fill','#f8fafc');
  else if (f.target - f.spent < 0.6) liq.setAttribute('fill','#fce7f3');
  else liq.setAttribute('fill','#f9a8d4');
  const sl = document.getElementById('spent-lbl-' + idx);
  sl.textContent = f.spent > 0.01 ? f.spent.toFixed(2) + ' мл' : '';
}

// ── Right panel status ──
function updateSide() {
  const f = flasks[activeIdx];
  const sf = document.getElementById('st-filter');
  sf.className = 'tag ' + (f.filtered ? 'tag-green' : 'tag-gray');
  sf.textContent = f.filtered ? '✓ да' : 'нет';
  const s = document.getElementById('st-sample');
  s.className = 'tag ' + (f.hasSample ? 'tag-green' : 'tag-gray');
  s.textContent = f.hasSample ? '✓ да' : 'нет';
  const ind = document.getElementById('st-ind');
  ind.className = 'tag ' + (f.indDrops >= 2 ? 'tag-green' : f.indDrops > 0 ? 'tag-red' : 'tag-gray');
  ind.textContent = f.indDrops;
  const c = document.getElementById('st-color');
  if (!f.hasSample || f.indDrops === 0) { c.className='tag tag-gray'; c.textContent='—'; }
  else if (f.spent >= f.target) { c.className='tag tag-green'; c.textContent='⬜ бесцв.'; }
  else if (f.target-f.spent < 0.6) { c.className='tag tag-red'; c.textContent='🌸 бледн.'; }
  else { c.className='tag tag-red'; c.textContent='🌺 малин.'; }
  // drop count label
  const dc = document.getElementById('drop-count');
  if (f.indDrops > 0) {
    dc.textContent = f.indDrops + ' кап. добавлено';
    dc.style.color = f.indDrops >= 2 ? '#16a34a' : '#dc2626';
  } else { dc.textContent = ''; }
}

// ── Endpoint record ──
function onEndpoint() {
  const f = flasks[activeIdx];
  updateFlask(activeIdx); updateSide();
  const vHCl = f.spent;
  const endReading = startVol + vHCl;
  document.getElementById('r-end').textContent = endReading.toFixed(2) + ' мл';
  document.getElementById('r-vol').textContent = vHCl.toFixed(2) + ' мл';
  const cb = document.getElementById('calc-block');
  cb.style.display = 'block';
  document.getElementById('calc-rows').innerHTML = `
    <div class="rrow"><span class="rlbl">V₀</span><span class="rval">${startVol.toFixed(2)} мл</span></div>
    <div class="rrow"><span class="rlbl">V₁</span><span class="rval">${endReading.toFixed(2)} мл</span></div>
    <div class="rrow" style="background:#eff6ff;border-radius:5px;padding:4px 3px;border:none;">
      <span class="rlbl" style="color:#2563eb;font-weight:700;">V(HCl)</span>
      <span class="rval" style="color:#2563eb;font-size:11px;">${vHCl.toFixed(2)} мл</span>
    </div>`;
  if (flasks.filter(x => x.recorded).length === 3) showSummary();
}

function showSummary() {
  const panel = document.getElementById('summary-panel');
  panel.style.display = 'block';
  let rows = '';
  flasks.forEach((f, i) => {
    rows += `<tr><td>${i+1}</td><td style="font-weight:700;color:#2563eb;">${f.spent.toFixed(2)}</td></tr>`;
  });
  document.getElementById('summary-content').innerHTML = `
    <table>
      <thead><tr><th>Опыт</th><th>V(HCl), мл</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:6px;font-size:8px;color:#64748b;line-height:1.5;">Рассчитайте интенсивность дыхания самостоятельно.</div>`;
}

function flash(msg) {
  const el = document.createElement('div');
  el.textContent = msg;
  el.style.cssText = 'position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:8px 16px;border-radius:10px;font-size:11px;font-weight:600;z-index:9999;pointer-events:none;transition:opacity .4s;';
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; setTimeout(() => el.remove(), 400); }, 2000);
}
</script>
</body>
</html>
